<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Smart stock control</p>
          <h1>Inventory Management System</h1>
          <p class="hero-text">
            Track products, monitor low stock, and keep your warehouse organized.
          </p>
        </div>
        <button id="clear-data" class="secondary-btn">Reset Demo Data</button>
      </header>

      <section class="summary-grid">
        <article class="card stat-card">
          <p>Total Items</p>
          <h2 id="total-items">0</h2>
        </article>
        <article class="card stat-card">
          <p>Low Stock</p>
          <h2 id="low-stock">0</h2>
        </article>
        <article class="card stat-card">
          <p>Inventory Value</p>
          <h2 id="inventory-value">$0</h2>
        </article>
      </section>

      <section class="content-grid">
        <form id="item-form" class="card form-card">
          <h3 id="form-title">Add Item</h3>
          <input type="hidden" id="item-id" />

          <label>
            Product Name
            <input id="name" required placeholder="e.g. Wireless Mouse" />
          </label>

          <label>
            Category
            <input id="category" required placeholder="e.g. Electronics" />
          </label>

          <label>
            Quantity
            <input id="quantity" type="number" min="0" required />
          </label>

          <label>
            Price ($)
            <input id="price" type="number" min="0" step="0.01" required />
          </label>

          <label>
            Supplier
            <input id="supplier" required placeholder="e.g. Tech Supplies" />
          </label>

          <label>
            Reorder Level
            <input id="reorder" type="number" min="0" required />
          </label>

          <div class="form-actions">
            <button type="submit" class="primary-btn">Save Item</button>
            <button type="button" id="cancel-edit" class="secondary-btn hidden">Cancel</button>
          </div>
        </form>

        <section class="card table-card">
          <div class="toolbar">
            <input id="search" type="search" placeholder="Search items..." />
            <select id="category-filter">
              <option value="all">All Categories</option>
            </select>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Qty</th>
                  <th>Price</th>
                  <th>Supplier</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="inventory-list"></tbody>
            </table>
          </div>
        </section>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
